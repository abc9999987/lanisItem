    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #f4f4f4; margin: 0; }
    header { background: linear-gradient(125deg, #3b3eef, #9a4ef3); padding: 1rem 1.2rem; box-shadow: 0 4px 12px rgba(0,0,0,.4); }
    header h1 { margin: 0; font-size: 1.5rem; }
    .container { width: min(1200px, 96vw); margin: 1rem auto 3rem; }
    .panel { display: grid; grid-template-columns: repeat(auto-fit,minmax(220px,1fr)); gap: 0.8rem; background: #1e1e1e; padding: 1rem; border-radius: 10px; }
    .panel label { display: flex; flex-direction: column; font-size: .9rem; gap: 0.4rem; }
    .panel input, .panel select { border: 1px solid #444; border-radius: 7px; padding: 0.5rem; background: #0f0f13; color: #fdfdfd; }
    .panel input::placeholder { color: #aaa; }
    .stats { margin-top: 1rem; color: #a1a1a1; }
    .grid { display: grid; gap: 0.85rem; grid-template-columns: repeat(auto-fit,minmax(200px,1fr)); margin-top: 1rem; }
    .card { border-radius: 12px; overflow: hidden; border: 1px solid #333; background: linear-gradient(145deg, #1e1e2b, #111116); box-shadow: 0 6px 18px rgba(0,0,0,.35); padding: 0.9rem; }
    .card h3 { margin: 0 0 0.4rem; font-size: 1.05rem; }
    .card p { margin: 0.18rem 0; font-size: .9rem; }
    .tag { display: inline-block; margin-right: 0.35rem; margin-top: 0.25rem; padding: 0.15rem 0.45rem; background: #2a2a35; border-radius: 5px; font-size: .78rem; color: #cfd6ff; }
    .nolike { text-align: center; padding: 1.2rem; color: #ffb8b8; }
    .drop-instruction { margin-top: 0.8rem; color: #b7b7b7; font-size: .9rem; }
    .hidden { display: none; }
  </style>
</head>

      </label>
      <label>
        어빌리티 이름 검색:
        <input id="abilitySearch" type="text" placeholder="예: 테크 파워 플러스" autocomplete="off" />

      <label>

      </label>
      <label>

      <label>

    <div class="stats" id="stats">로딩 중...</div>

    function setOptions(select, values, label) {
      select.innerHTML = '';
      const allOpt = document.createElement('option');
      allOpt.value = '';
      allOpt.textContent = '전체 ' + label;
      select.appendChild(allOpt);

      values.forEach(v => {
        const opt = document.createElement('option');
        opt.value = v;
        opt.textContent = v;
        select.appendChild(opt);
      });
    }

    function formatValue(value) {
      return value == null || value === '' ? '-' : value;
    }

    function renderItems(list) {
      resultGrid.innerHTML = '';
      if (!list.length) {
        resultGrid.innerHTML = '<div class="nolike">검색 결과가 없습니다.</div>';
        stats.textContent = `검색 결과: ${0}개`;
        return;
      }

      list.forEach(item => {
        const card = document.createElement('article');
        card.className = 'card';

        const title = document.createElement('h3');
        title.textContent = item.name || '이름 없음';
        card.appendChild(title);

        const typeLine = document.createElement('p');
        typeLine.innerHTML = '<strong>유형:</strong> ' + formatValue(item.type || item.weaponType);
        card.appendChild(typeLine);

        const elementLine = document.createElement('p');
        elementLine.innerHTML = '<strong>속성:</strong> ' + formatValue(item.element);
        card.appendChild(elementLine);

        const statsPowerLine = document.createElement('p');
        const minPower = item.stats?.minPower ?? '-';
        const maxPower = item.stats?.maxPower ?? '-';
        statsPowerLine.innerHTML = '<strong>공격력:</strong> ' + minPower + ' ~ ' + maxPower;
        card.appendChild(statsPowerLine);

        const statsWeightLine = document.createElement('p');
        const minWeight = item.stats?.minWeight ?? '-';
        const maxWeight = item.stats?.maxWeight ?? '-';
        statsWeightLine.innerHTML = '<strong>무게:</strong> ' + minWeight + ' ~ ' + maxWeight;
        card.appendChild(statsWeightLine);

        const abilityLine = document.createElement('p');
        abilityLine.innerHTML = '<strong>어빌리티:</strong> ' + formatValue(item.abilities);
        card.appendChild(abilityLine);

        if (item.rarity) {
          const badge = document.createElement('span');
          badge.className = 'tag';
          badge.textContent = item.rarity;
          card.appendChild(badge);
        }

        if (item.weaponType) {
          const badge2 = document.createElement('span');
          badge2.className = 'tag';
          badge2.textContent = item.weaponType;
          card.appendChild(badge2);
        }

        resultGrid.appendChild(card);
      });

      stats.textContent = `검색 결과: ${list.length}개 / 총 ${items.length}개`;
    }

    function filterAndRender() {
      if (!hasUserInteracted) {
        stats.textContent = '검색어나 필터를 입력하세요.';
        resultGrid.innerHTML = '<div class="nolike">검색어 또는 필터를 선택하면 결과가 표시됩니다.</div>';
        return;
      }

      const query = nameSearch.value.trim().toLowerCase();
      const abilityQuery = abilitySearch.value.trim().toLowerCase();
      const type = typeFilter.value;
      const weaponType = weaponTypeFilter.value;
      const element = elementFilter.value;

      const filtered = items.filter(item => {
        const hasName = query === '' || (item.name && item.name.toLowerCase().includes(query));
        const abilityText = (item.abilities || '').toString();
        const abilityName = abilityText.split(':')[0].trim().toLowerCase();
        const hasAbility = abilityQuery === '' || (abilityName && abilityName.includes(abilityQuery));
        const hasType = !type || item.type === type;
        const hasWeaponType = !weaponType || item.weaponType === weaponType;
        const hasElement = !element || item.element === element;
        return hasName && hasAbility && hasType && hasWeaponType && hasElement;
      });

      renderItems(filtered);
    }

    function initData(rawData) {
      if (!rawData) {
        stats.textContent = '데이터를 로드하지 못했습니다.';
        return;
      }

      const rareItems = Array.isArray(rawData.rareItems) ? rawData.rareItems : [];
      items = rareItems;

      const typeSet = new Set();
      const weaponTypeSet = new Set();
      const elementSet = new Set();

      rareItems.forEach(item => {
        if (item.type) typeSet.add(item.type);
        if (item.weaponType) weaponTypeSet.add(item.weaponType);
        if (item.element) elementSet.add(item.element);
      });

        setOptions(typeFilter, [...typeSet].sort(), '타입');
      setOptions(weaponTypeFilter, [...weaponTypeSet].sort(), '무기 타입');
      weaponTypeFilter.disabled = true;
      setOptions(elementFilter, [...elementSet].sort(), '속성');

      resultGrid.innerHTML = '<div class="nolike">검색어 또는 필터를 선택하면 결과가 표시됩니다.</div>';
      stats.textContent = '검색어 또는 필터를 선택하면 결과가 표시됩니다.';
      dropInstruction.classList.add('hidden');
    }

    function loadDataFromEmbedded() {
      if (!embeddedData || !Array.isArray(embeddedData.rareItems)) {
        stats.textContent = 'embeddedData에 rareItems 배열이 필요합니다.';
        dropInstruction.classList.remove('hidden');
        initData({ rareItems: [] });
        return;
      }

      initData(embeddedData);
    }

    nameSearch.addEventListener('input', () => {
      hasUserInteracted = true;
      filterAndRender();
    });
    abilitySearch.addEventListener('input', () => {
      hasUserInteracted = true;
      filterAndRender();
    });
    typeFilter.addEventListener('change', () => {
      hasUserInteracted = true;
      if (typeFilter.value === 'Weapon') {
        weaponTypeFilter.disabled = false;
      } else {
        weaponTypeFilter.value = '';
        weaponTypeFilter.disabled = true;
      }
      filterAndRender();
    });
    weaponTypeFilter.addEventListener('change', () => {
      hasUserInteracted = true;
      filterAndRender();
    });
    elementFilter.addEventListener('change', () => {
      hasUserInteracted = true;
      filterAndRender();
    });

    loadDataFromEmbedded();
  </script>
</body>
</html>
